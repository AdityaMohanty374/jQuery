<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jQuery Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; }
    section { margin-bottom: 32px; }
    h2 { font-size: 1rem; margin-bottom: 10px; color: #555; }

    button {
      padding: 8px 16px; margin-right: 6px;
      border: 1px solid #ccc; border-radius: 6px;
      cursor: pointer; background: #fff;
    }
    button:hover { background: #f0f0f0; }

    #count { font-size: 2rem; font-weight: bold; margin: 10px 0; }

    #box {
      width: 80px; height: 80px; background: tomato;
      border-radius: 8px; margin-top: 10px;
    }

    input[type="text"] {
      padding: 8px; border: 1px solid #ccc;
      border-radius: 6px; width: 200px;
    }

    #output { margin-top: 10px; color: #333; }

    ul { list-style: none; padding: 0; margin-top: 10px; }
    ul li {
      padding: 8px 12px; background: #f5f5f5;
      border-radius: 6px; margin-bottom: 6px;
      display: flex; justify-content: space-between;
    }
    ul li span { cursor: pointer; color: #999; }
    ul li span:hover { color: tomato; }
  </style>
</head>
<body>

  <h1>jQuery — Dynamic Behavior</h1>

  <!-- 1. Counter -->
  <section>
    <h2>1. Counter</h2>
    <div id="count">0</div>
    <button id="inc">+ Add</button>
    <button id="dec">− Sub</button>
  </section>

  <!-- 2. Show / Hide -->
  <section>
    <h2>2. Show / Hide</h2>
    <button id="toggle">Toggle Box</button>
    <div id="box"></div>
  </section>

  <!-- 3. Live Input -->
  <section>
    <h2>3. Live Input</h2>
    <input type="text" id="name" placeholder="Type your name…">
    <div id="output">Hello, stranger!</div>
  </section>

  <!-- 4. Todo List -->
  <section>
    <h2>4. Todo List</h2>
    <input type="text" id="task" placeholder="New task…">
    <button id="add">Add</button>
    <ul id="list"></ul>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script>
    $(function () {

      // 1. Counter
      var n = 0;
      $('#inc').click(function () { $('#count').text(++n); });
      $('#dec').click(function () { $('#count').text(--n); });

      // 2. Show / Hide
      $('#toggle').click(function () { $('#box').toggle(300); });

      // 3. Live Input
      $('#name').on('input', function () {
        var val = $(this).val();
        $('#output').text(val ? 'Hello, ' + val + '!' : 'Hello, stranger!');
      });

      // 4. Todo List
      $('#add').click(addTask);
      $('#task').keypress(function (e) { if (e.key === 'Enter') addTask(); });

      function addTask() {
        var text = $('#task').val().trim();
        if (!text) return;
        var $li = $('<li>').html(text + ' <span>✕</span>');
        $li.find('span').click(function () { $li.fadeOut(200, function () { $li.remove(); }); });
        $('#list').append($li);
        $('#task').val('');
      }

    });
  </script>
</body>
</html>
